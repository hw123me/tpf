<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول وتسجيل</title>
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/u/0/d/1QfAv8PJgyadBVxdSjp2pa8FUB_jteU05">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-bootstrap-4/bootstrap-4.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #063c4a 0%, #15214b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
    </style>
</head>

<body>
    <div class="container-auth pt-5 d-flex align-items-center justify-content-center pb-5">
        <div class="card shadow-lg" style="max-width: 450px; width: 100%; border-radius: 15px;">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="bg-primary bg-opacity-10 d-inline-block p-3 rounded-circle mb-3">
                        <i class="bi bi-shield-lock-fill text-primary fs-1"></i>
                    </div>
                    <h4 class="fw-bold text-dark">إدارة الشواهد التعليمية</h4>
                    <p class="text-muted small">مجمع الإمام يعقوب وأبو عمرو البصري</p>
                </div>

                <ul class="nav nav-pills nav-fill mb-4" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#login">دخول</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#register">تسجيل</button>
                    </li>
                </ul>

                <div class="tab-content">
                    <div class="tab-pane fade show active" id="login">
                        <h5 class="text-custom text-center mb-4">تسجيل الدخول</h5>
                        <form onsubmit="loginUser(event)">
                            <div class="mb-3">
                                <label class="form-label">البريد الإلكتروني</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-envelope"></i></span>
                                    <input type="email" id="loginEmail" class="form-control"
                                        placeholder="example@mail.com" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">كلمة المرور</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
                                    <input type="password" id="loginPassword" class="form-control password-input"
                                        placeholder="أدخل كلمة المرور" required>
                                    <button class="btn btn-outline-secondary toggle-password" type="button">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="remember">
                                <label class="form-check-label" for="remember">تذكرني</label>
                            </div>
                            <button type="submit" id="btnlogin" class="btn btn-primary w-100 py-2 fw-bold">دخول</button>
                            <div class="text-center mt-3">
                                <a href="#" class="small" onclick="forgotPassword()">نسيت كلمة المرور؟</a>
                            </div>

                        </form>
                    </div>

                    <div class="tab-pane fade" id="register">
                        <h5 class="text-custom text-center mb-4">إنشاء حساب جديد</h5>
                        <form id="regForm" onsubmit="registerUser(event)">
                            <div class="mb-3">
                                <label class="form-label">الاسم الكامل</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
                                    <input type="text" id="regName" class="form-control" placeholder="الاسم الثلاثي"
                                        required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">البريد الإلكتروني</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-envelope"></i></span>
                                    <input type="email" id="regEmail" class="form-control"
                                        placeholder="mail@example.com" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">الدور الوظيفي</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-briefcase"></i></span>
                                    <select class="form-select" id="role" required>
                                        <option value="" disabled selected>اختر دورك الوظيفي</option>
                                        <option value="معلم">معلم</option>
                                        <option value="وكيل">وكيل</option>
                                        <option value="موجه طلابي">موجه طلابي</option>
                                        <option value="رائد نشاط">رائد نشاط</option>
                                        <option value="محضر مختبر">محضر مختبر</option>
                                    </select>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">كلمة المرور</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
                                    <input type="password" id="regPassword" class="form-control password-input"
                                        placeholder="كلمة المرور" required>
                                    <button class="btn btn-outline-secondary toggle-password" type="button">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">تأكيد كلمة المرور</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-shield-check"></i></span>
                                    <input type="password" id="regConfirmPassword" class="form-control password-input"
                                        placeholder="أعد الإدخال" required>
                                    <button class="btn btn-outline-secondary toggle-password" type="button">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                            </div>
                            <button type="submit" id="btnReg" class="btn btn-primary w-100 py-2 fw-bold">تسجيل</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>


 <script src="./config.js"></script>
    <script type="module">
        import {
            getAuth,
            createUserWithEmailAndPassword,
            signInWithEmailAndPassword,
            sendPasswordResetEmail
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
     
       
        // تهيئة Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // جعل الوظيفة متاحة للنموذج
        window.registerUser = async (event) => {
            event.preventDefault();

            const btn = document.getElementById('btnReg'); // الزر الخاص بك
            const originalText = btn.innerHTML; // حفظ نص الزر الأصلي (تسجيل)

            // الحصول على القيم
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const role = document.getElementById('role').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;

            if (password !== confirmPassword) {
                Swal.fire({
                    icon: 'error',
                    title: 'خطأ',
                    text: 'كلمتا المرور غير متطابقتين.',
                    confirmButtonText: 'حسناً'
                });
                return;
            }

            try {
                // --- بدء حالة التحميل ---
                btn.disabled = true; // تعطيل الزر لمنع النقرات المتكررة
                btn.innerHTML = `<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> جاري المعالجة...`;

                // 1. إنشاء الحساب
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 2. تخزين البيانات في Firestore
                await setDoc(doc(db, "users", user.uid), {
                    fullName: name,
                    email: email,
                    role: role,
                    createdAt: new Date()
                });

                // --- نجاح العملية ---
                Swal.fire({
                    icon: 'success',
                    title: 'تم بنجاح',
                    text: 'تم إنشاء الحساب، يمكنك الدخول الآن',
                    timer: 2000,
                    showConfirmButton: false
                });

                document.querySelector('[data-bs-target="#login"]').click(); // الانتقال لتبويب الدخول
                document.getElementById('regForm').reset(); // تصفير النموذج

            } catch (error) {
                console.error("خطأ:", error.message);
                Swal.fire({
                    icon: 'error',
                    title: 'فشل التسجيل',
                    text: error.message, // هنا سيظهر لك سبب الخطأ (مثل البريد مستخدم مسبقاً)
                    confirmButtonText: 'حسناً'
                });
            } finally {
                // --- إنهاء حالة التحميل ---
                // هذا الجزء سيعمل سواء نجحت العملية أو فشلت لإعادة الزر للعمل
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        };

        window.loginUser = async (event) => {
            event.preventDefault();
            const btn = document.getElementById('btnlogin');
            const originalText = btn.innerHTML;

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                btn.disabled = true;
                btn.innerHTML = `جاري التحقق...`;

                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                const userDocRef = doc(db, "users", user.uid);
                const userDocSnap = await getDoc(userDocRef);

                if (userDocSnap.exists()) {
                    const userData = userDocSnap.data();
                    const userRole = userData.role; // هنا حصلنا على القيمة المطلوبة

                    console.log("دور المستخدم الحالي هو:", userRole);

                    // 3. التوجيه بناءً على الدور
                    handleRedirection(userRole);
                } else {
                    console.error("لم يتم العثور على بيانات إضافية لهذا المستخدم في Firestore");
                }


            } catch (error) {
                // هذا السطر سيطبع لك الكود الدقيق للخطأ في المتصفح
                console.error("Firebase Error Code:", error.code);
                console.error("Firebase Error Message:", error.message);

                Swal.fire({
                    icon: 'error',
                    title: 'فشل الدخول',
                    text: `السبب: ${error.message}` // سيظهر السبب بالإنجليزية مؤقتاً للتشخيص
                });
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        };
        // دالة مساعدة للتوجيه
        function handleRedirection(role) {
            if (role === "admin") {
                window.location.href = "admin_dashboard.html";
            } else {
                window.location.href = "dashboard.html";
            }
        }

        // إضافة مستمعات النقر لجميع أزرار إظهار/إخفاء كلمة المرور  
        document.querySelectorAll('.toggle-password').forEach(button => {
            button.addEventListener('click', function () {
                // البحث عن حقل الإدخال في نفس مجموعة "input-group"
                const input = this.parentElement.querySelector('.password-input');
                const icon = this.querySelector('i');

                if (input.type === "password") {
                    input.type = "text";
                    icon.classList.replace('bi-eye', 'bi-eye-slash');
                } else {
                    input.type = "password";
                    icon.classList.replace('bi-eye-slash', 'bi-eye');
                }
            });
        });

        window.forgotPassword = async () => {
            // جلب الإيميل من خانة الإدخال في صفحة اللوجن
            const emailField = document.getElementById('loginEmail');
            const email = emailField ? emailField.value : "";

            if (!email) {
                Swal.fire('تنبيه', 'يرجى كتابة بريدك الإلكتروني في الحقل المخصص أولاً ليتم إرسال رابط الاستعادة إليه.', 'warning');
                return;
            }

            const result = await Swal.fire({
                title: 'استعادة كلمة المرور',
                text: `هل تريد إرسال رابط تعيين كلمة مرور جديدة إلى: ${email}؟`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'نعم، أرسل الرابط',
                cancelButtonText: 'إلغاء'
            });

            if (result.isConfirmed) {
                try {
                    Swal.showLoading();
                    await sendPasswordResetEmail(auth, email);
                    Swal.fire('تم الإرسال!', 'راجع بريدك الإلكتروني الآن (بما في ذلك Junk/Spam).', 'success');
                } catch (error) {
                    console.error(error);
                    let msg = 'حدث خطأ أثناء محاولة إرسال البريد.';
                    if (error.code === 'auth/user-not-found') msg = 'هذا البريد غير مسجل لدينا.';
                    Swal.fire('خطأ', msg, 'error');
                }
            }
        };
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>

</html>
