<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الشواهد التعليمية</title>
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/u/0/d/1QfAv8PJgyadBVxdSjp2pa8FUB_jteU05">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-bootstrap-4/bootstrap-4.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="bg-primary text-white shadow-sm mb-0 mx-2 my-1 rounded">
        <div class="container py-3">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h5 class="mb-0 fw-bold" id="welcomeMsg" style="cursor: pointer;" onclick="showProfileMenu()">
                        جاري التحميل... <i class="bi bi-pencil-square ms-1 small opacity-50"></i>
                    </h5>
                    <small class="opacity-75"> مجمع الإمام يعقوب وأبو عمرو اليصري </small>

                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-light btn-sm fw-bold px-3 shadow-sm" onclick="logout()">
                        <i class="bi bi-box-arrow-right me-1"></i> خروج
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="container mt-4 mb-5">
        <div class="container mt-5 mb-5">

            <div class="row">
                <div class="col-12">
                    <h5 class="text-dark fw-bold mb-3 d-flex align-items-center">
                        <i class="bi bi-list-stars me-2 text-primary"></i> المجالات والمعايير الخاصة بك
                    </h5>
                    <div class="card shadow-sm border-0 mb-4">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <h6 class="fw-bold mb-0">نسبة إنجاز الشواهد المرفوعة</h6>
                                <span id="percentText" class="badge bg-primary fs-6">0%</span>
                            </div>
                            <div class="progress" style="height: 15px; border-radius: 10px;">
                                <div id="completionBar"
                                    class="progress-bar progress-bar-striped progress-bar-animated bg-success"
                                    role="progressbar" style="width: 0%"></div>
                            </div>
                            <small class="text-muted mt-2 d-block" id="statsText">جاري الحساب...</small>
                        </div>
                    </div>
                    <div class="accordion accordion-flush shadow-sm rounded-3 overflow-hidden " id="domainsAccordion">
                        <div class="text-center p-5 bg-light" id="loader">
                            <div class="spinner-border text-primary mb-3" role="status"></div>
                            <p class="text-muted">جاري مزامنة البيانات مع السيرفر...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="modal fade" id="uploadModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">رفع شاهد جديد</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center">
                    <h6 class="mb-3">رفع ملف لمجال: <span id="domainNameDisplay" class="text-primary"></span></h6>

                    <div class="mb-3 text-start">
                        <label class="form-label small fw-bold">اختر الملف</label>
                        <input type="file" id="fileInput" class="form-control" accept=".pdf,image/*">
                    </div>

                    <div id="uploadProgress" class="progress d-none mb-3" style="height: 8px;">
                        <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar"
                            style="width: 100%"></div>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">إلغاء</button>
                    <button type="button" id="startUploadBtn" class="btn btn-primary px-4">تأكيد الرفع</button>
                </div>
            </div>
        </div>
    </div>
    <footer class="custom-footer text-white mt-auto py-2"
        style="background: #1e3c72; border-top: 2px solid rgba(255,255,255,0.1);">
        <div class="container">
            <div class="row align-items-center opacity-75">
                <div class="col-md-4 text-center text-md-end mb-2 mb-md-0">
                    <i class="bi bi-cloud-arrow-up-fill me-1"></i>
                    <span class="x-small"> إدارة الشواهد التعليمية </span>
                </div>
                <div class="col-md-2 text-center text-md-center mb-2 mb-md-0">
                    <span class="x-small"> جميع الحقوق محفوظة &copy; 2026 </span>
                </div>

                <div class="col-md-6 text-center text-md-end">
                    <div class="d-flex flex-row justify-content-center justify-content-md-end gap-3 x-small">
                        <span>
                            <i class="bi bi-lightbulb text-warning me-1"></i> فكرة:
                            <span class="fw-bold">خالد المالكي</span>
                        </span>
                        <span class="vr d-none d-md-inline-block opacity-25"></span> <span>
                            <i class="bi bi-code-slash text-info me-1"></i> تطوير:
                            <span class="fw-bold">عبدالرزاق المعلوي</span>
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </footer>
 <script src="./config.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import {
            collection,
            getDocs,
            getDoc,
            addDoc,
            updateDoc,
            query,
            where,
            doc,
            deleteDoc
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
       
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        enableIndexedDbPersistence(db).catch((err) => {
            console.error("فشل تفعيل التخزين المحلي:", err.code);
        });
        const auth = getAuth(app);

        // التحقق من حالة تسجيل الدخول وجلب البيانات
        // متغيرات عامة للوصول للبيانات بسهولة في أي دالة
        let currentUserData = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    // جلب بيانات المستخدم من Firestore
                    const userDoc = await getDoc(doc(db, "users", user.uid));

                    if (userDoc.exists()) {
                        currentUserData = userDoc.data(); // تخزين البيانات محلياً

                        // تحديث واجهة الترحيب
                        const welcomeMsg = document.getElementById('welcomeMsg');
                        welcomeMsg.innerHTML = `مرحباً، ${currentUserData.fullName} <span class="badge bg-white text-primary ms-2 small">${currentUserData.role}</span> <i class="bi bi-pencil-square ms-1 small opacity-50"></i>`;

                        // استدعاء الوظائف الأخرى
                        checkUserNotifications(user.uid);
                        loadDomains(currentUserData.role);
                    } else {
                        console.error("لا توجد بيانات لهذا المستخدم في Firestore");
                    }
                } catch (error) {
                    console.error("خطأ في جلب بيانات المستخدم:", error);
                }
            } else {
                window.location.href = "index.html";
            }
        });

        async function loadDomains(userRole) {
            const user = auth.currentUser;
            if (!user) return;
            const accordionContainer = document.getElementById('domainsAccordion');

            accordionContainer.innerHTML = '<div class="text-center p-5"><div class="spinner-border text-primary"></div></div>';

            try {
                // 1. تشغيل الطلبات بالتوازي لسرعة التحميل
                const [domainsSnap, evidencesSnap] = await Promise.all([
                    getDocs(collection(db, "domains")),
                    getDocs(query(collection(db, "evidences"), where("userId", "==", user.uid)))
                ]);

                // 2. تحويل الشواهد لمصفوفة بيانات جاهزة
                const userEvidences = evidencesSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));

                let totalRoleDomains = 0;
                let completedDomains = 0;
                let html = '';

                domainsSnap.forEach((docSnap) => {
                    const data = docSnap.data();
                    const domainName = data.domainName;
                    const criteriaList = data.criteriaList || [];

                    // التحقق هل المجال يخص الدور الوظيفي للمستخدم
                    const isForRole = criteriaList.some(c => c.role === userRole);

                    if (isForRole) {
                        totalRoleDomains++;

                        // التصحِيح هنا: تصفية الشواهد الخاصة بهذا المجال من المصفوفة الكلية
                        const domainEvidences = userEvidences.filter(e => e.domainName === domainName);
                        const evidenceCount = domainEvidences.length;

                        if (evidenceCount > 0) completedDomains++;

                        const collapseId = "col_" + Math.random().toString(36).substr(2, 9);

                        // أيقونة الحالة
                        const statusIcon = evidenceCount > 0
                            ? '<i class="bi bi-check-circle-fill text-success me-2"></i>'
                            : '<i class="bi bi-folder2 me-2 text-primary"></i>';

                        // العداد
                        const countBadge = evidenceCount > 0
                            ? `<span class="badge rounded-pill bg-primary-subtle text-primary border border-primary-subtle ms-auto px-3">${evidenceCount} شاهد</span>`
                            : `<span class="badge rounded-pill bg-light text-muted border ms-auto px-3 small">0</span>`;

                        html += `
                <div class="accordion-item shadow-sm border-0 mb-3 rounded-3 overflow-hidden ">
                    <h2 class="accordion-header ">
                        <button class="accordion-button collapsed fw-bold p-3" type="button" 
                                data-bs-toggle="collapse" 
                                data-bs-target="#${collapseId}">
                            <div class="d-flex align-items-center w-100  ">
                                ${statusIcon}
                                <span class="domain-title  ">${domainName}</span>
                                ${countBadge}
                            </div>
                        </button>
                    </h2>
                    
                    <div id="${collapseId}" class="accordion-collapse collapse">
                        <div class="accordion-body bg-white border-top border-light">
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <h6 class="text-secondary fw-bold mb-0 small">
                                    <i class="bi bi-files me-1"></i> الملفات المرفقة
                                </h6>
                                <button class="btn btn-sm btn-primary rounded-pill px-3 shadow-sm" onclick="handleUpload('${docSnap.id}', '${domainName}')">
                                    رفع جديد <i class="bi bi-plus-lg ms-1"></i>
                                </button>
                            </div>
                            <div class="list-group list-group-flush">
                                ${evidenceCount > 0 ? domainEvidences.map(ev => `
                                    <div class="list-group-item d-flex justify-content-between align-items-center border-0 bg-light rounded-3 mb-2 p-3">
                                        <div class="d-flex align-items-center text-truncate">
                                            <i class="bi bi-file-earmark-text-fill text-primary fs-4 me-3"></i>
                                            <div class="text-truncate">
                                                <div class="fw-bold small text-dark text-truncate">${ev.fileName}</div>
                                                <div class="x-small text-muted">${ev.uploadDate?.seconds ? new Date(ev.uploadDate.seconds * 1000).toLocaleDateString('ar-SA') : 'تاريخ غير معروف'}</div>
                                            </div>
                                        </div>
                                        <div class="d-flex gap-2">
                                            <a href="${ev.fileUrl}" target="_blank" class="btn btn-white btn-sm shadow-sm rounded-circle text-primary">
                                                <i class="bi bi-eye"></i>
                                            </a>
                                            <button class="btn btn-white btn-sm shadow-sm rounded-circle text-danger" onclick="deleteEvidence('${ev.id}')">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </div>
                                    </div>
                                `).join('') : `
                                    <div class="text-center py-4 rounded-3 border-2 border-dashed bg-light">
                                        <i class="bi bi-cloud-upload text-muted fs-1 d-block mb-2"></i>
                                        <p class="text-muted small mb-0">لم تقم برفع أي شواهد لهذا المجال بعد</p>
                                    </div>
                                `}
                            </div>
                        </div>
                    </div>
                </div>`;
                    }
                });

                accordionContainer.innerHTML = html || '<div class="alert alert-warning text-center">لا توجد مجالات مخصصة لدورك الوظيفي حالياً.</div>';

                // تحديث شريط التقدم الكلي
                updateProgressBar(totalRoleDomains, completedDomains);

            } catch (error) {
                console.error("خطأ في التحميل:", error);
                accordionContainer.innerHTML = '<div class="alert alert-danger">حدث خطأ أثناء جلب البيانات. يرجى المحاولة لاحقاً.</div>';
            }
        }
        function updateProgressBar(total, completed) {
            const percentage = total > 0 ? Math.round((completed / total) * 100) : 0;

            const bar = document.getElementById('completionBar');
            const text = document.getElementById('percentText');
            const stats = document.getElementById('statsText');

            bar.style.width = percentage + "%";
            text.innerText = percentage + "%";
            stats.innerText = `تم إكمال ${completed} من أصل ${total} مجالات مطلوبة`;

            // تغيير لون الشريط إذا اكتمل العمل
            if (percentage === 100) {
                bar.classList.remove('bg-success');
                bar.classList.add('bg-primary');
            }
        }

        window.deleteEvidence = async (evidenceId) => {
            const user = auth.currentUser;
            if (!user) return;
            const result = await Swal.fire({
                title: 'هل أنت متأكد؟',
                text: "سيتم حذف الشاهد نهائياً من سجلاتك!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'نعم، احذف',
                cancelButtonText: 'إلغاء'
            });

            if (result.isConfirmed) {
                try {
                    await deleteDoc(doc(db, "evidences", evidenceId));
                    Swal.fire('تم الحذف!', 'تمت إزالة الشاهد بنجاح.', 'success');

                    // إعادة تحميل البيانات لتحديث القائمة
                    const userDoc = await getDoc(doc(db, "users", auth.currentUser.uid));
                    loadDomains(userDoc.data().role);

                } catch (error) {
                    Swal.fire('خطأ', 'فشل الحذف، حاول مرة أخرى', 'error');
                }
            }
        };

        // دالة الخروج
        window.logout = () => {
            signOut(auth).then(() => {
                window.location.href = "index.html";
            });
        };

        let selectedIndicator = "";
        let selectedDomainId = "";
        let selectedDomainName = ""; // متغير عام لتخزين الاسم

        // دالة تفتح النافذة المنبثقة
        window.handleUpload = (domainId, domainName) => {
            selectedDomainName = domainName; // حفظ الاسم لاستخدامه عند الحفظ في Firestore
            document.getElementById('domainNameDisplay').innerText = domainName;

            const myModal = new bootstrap.Modal(document.getElementById('uploadModal'));
            myModal.show();
        };

        // دالة تحويل الملف لـ Base64 وإرساله لـ Apps Script
        document.getElementById('startUploadBtn').addEventListener('click', async () => {
            const fileInput = document.getElementById('fileInput');
            const btn = document.getElementById('startUploadBtn');
            const progress = document.getElementById('uploadProgress');

            if (fileInput.files.length === 0) {
                Swal.fire('تنبيه', 'يرجى اختيار ملف أولاً', 'warning');
                return;
            }

            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onload = async (e) => {
                const base64Content = e.target.result.split(',')[1];

                try {
                    btn.disabled = true;
                    progress.classList.remove('d-none');

                    // إرسال البيانات لـ Google Apps Script
                    const response = await fetch('https://script.google.com/macros/s/AKfycbzkEnBe3oFl1PtXzXK1BMUxg1rRrWY1v8-7yujQUm93filbV7B3P5nK-8uoFuA_5n31/exec', {
                        method: 'POST',
                        body: JSON.stringify({
                            fileBase64: base64Content,
                            fileName: file.name,
                            contentType: file.type
                        })
                    });

                    const result = await response.json();

                    if (result.status === "success") {
                        // هنا نقوم بتخزين رابط الملف في Firestore لربطه بالمستخدم والمؤشر
                        await saveEvidenceToFirestore(result.fileUrl, file.name);

                        Swal.fire('نجاح', 'تم رفع الشاهد وحفظ الرابط بنجاح', 'success');
                        bootstrap.Modal.getInstance(document.getElementById('uploadModal')).hide();
                        // إعادة تحميل البيانات لتحديث القائمة
                        const userDoc = await getDoc(doc(db, "users", auth.currentUser.uid));
                        loadDomains(userDoc.data().role);
                    }
                } catch (error) {
                    Swal.fire('خطأ', 'حدثت مشكلة أثناء الرفع', 'error');
                } finally {
                    btn.disabled = false;
                    progress.classList.add('d-none');
                }
            };

            reader.readAsDataURL(file);
        });

        // دالة حفظ بيانات الشاهد المعدلة
        async function saveEvidenceToFirestore(fileUrl, fileName) {
            const user = auth.currentUser;
            // التأكد من وجود المستخدم وبياناته
            if (!user || !currentUserData) return;

            try {
                const evidenceRef = collection(db, "evidences");

                await addDoc(evidenceRef, {
                    domainName: selectedDomainName,
                    fileUrl: fileUrl,
                    fileName: fileName,
                    userName: currentUserData.fullName, // استخدام المتغير العام مباشرة
                    userRole: currentUserData.role,     // إضافة الدور الوظيفي للسجل (اختياري ومفيد للمدير)
                    userId: user.uid,
                    uploadDate: new Date(),
                    isFeatured: false,
                    status: "قيد المراجعة"
                });

                console.log("تم تسجيل الشاهد بنجاح باسم المستخدم المعتمد.");
            } catch (error) {
                console.error("خطأ في حفظ البيانات:", error);
                throw error;
            }
        }

        async function checkUserNotifications(uid) {
            const q = query(
                collection(db, "notifications"),
                where("targetUserId", "==", uid),
                where("isRead", "==", false)
            );

            const snap = await getDocs(q);
            snap.forEach((notificationDoc) => {
                const data = notificationDoc.data();

                // إظهار التنبيه بشكل أنيق باستخدام SweetAlert
                Swal.fire({
                    title: 'تنبيه إداري جديد',
                    text: data.message,
                    icon: 'info',
                    confirmButtonText: 'تم الاطلاع',
                }).then(async () => {
                    // تحديث التنبيه ليصبح مقروءاً فلا يظهر مرة أخرى
                    await updateDoc(doc(db, "notifications", notificationDoc.id), {
                        isRead: true
                    });
                });
            });
        }

        window.showProfileMenu = async () => {
            const { value: action } = await Swal.fire({
                title: 'إعدادات الحساب',
                showCancelButton: true,
                cancelButtonText: 'إغاء',
                confirmButtonText: 'اختيار',
                input: 'radio',
                inputOptions: {
                    'name': 'تعديل الاسم المستعار',
                    'pass': 'تغيير كلمة المرور'
                },
                inputValidator: (value) => {
                    if (!value) return 'يجب اختيار إجراء!';
                }
            });

            if (action === 'name') {
                editProfileName(); // استدعاء دالتك الأصلية لتعديل الاسم
            } else if (action === 'pass') {
                changePasswordRequest(); // استدعاء دالة تغيير الباسورد
            }
        };
        // تأكد أنك تستخدم window. قبل اسم الدالة
        window.editProfileName = async () => {
            const user = auth.currentUser;
            // التأكد من أن البيانات محملة مسبقاً
            if (!user || !currentUserData) {
                console.error("بيانات المستخدم غير متوفرة");
                return;
            }

            const currentName = currentUserData.fullName;

            const { value: newName } = await Swal.fire({
                title: 'تعديل الاسم المستعار',
                input: 'text',
                inputValue: currentName,
                inputLabel: 'الاسم الجديد',
                showCancelButton: true,
                confirmButtonText: 'حفظ التغييرات',
                cancelButtonText: 'إلغاء',
                inputValidator: (value) => {
                    if (!value || value.trim().length < 3) {
                        return 'يرجى كتابة اسم صحيح (3 حروف على الأقل)';
                    }
                }
            });

            if (newName && newName.trim() !== currentName) {
                try {
                    Swal.showLoading();

                    // 1. التحديث في قاعدة البيانات (Firestore)
                    const userDocRef = doc(db, "users", user.uid);
                    await updateDoc(userDocRef, {
                        fullName: newName.trim()
                    });

                    // 2. التحديث في المتغير العام (Global Variable) 
                    // هذا هو السطر الأهم لضمان أن الرفع القادم يستخدم الاسم الجديد
                    currentUserData.fullName = newName.trim();

                    // 3. تحديث واجهة المستخدم فوراً (Header)
                    const welcomeElement = document.getElementById('welcomeMsg');
                    if (welcomeElement) {
                        welcomeElement.innerHTML = `مرحباً، ${currentUserData.fullName} <span class="badge bg-white text-primary ms-2 small">${currentUserData.role}</span> <i class="bi bi-pencil-square ms-1 small opacity-50"></i>`;
                    }

                    Swal.fire({
                        icon: 'success',
                        title: 'تم التحديث!',
                        text: 'تم اعتماد الاسم الجديد في كامل النظام',
                        timer: 2000,
                        showConfirmButton: false
                    });

                } catch (error) {
                    console.error("Error updating name:", error);
                    Swal.fire('خطأ', 'فشل تحديث البيانات في السيرفر', 'error');
                }
            }
        };

        window.changePasswordRequest = async () => {
            const user = auth.currentUser;
            if (!user) return;

            const result = await Swal.fire({
                title: 'تغيير كلمة المرور',
                text: `هل تريد إرسال رابط إعادة تعيين كلمة المرور إلى بريدك: ${user.email}؟`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'نعم، أرسل الرابط',
                cancelButtonText: 'إلغاء'
            });

            if (result.isConfirmed) {
                try {
                    await sendPasswordResetEmail(auth, user.email);
                    Swal.fire('تم الإرسال!', 'يرجى مراجعة بريدك الإلكتروني (بما في ذلك البريد المهمل Junk).', 'success');
                } catch (error) {
                    Swal.fire('خطأ', 'حدث خطأ أثناء محاولة إرسال البريد.', 'error');
                }
            }
        };

    </script>
